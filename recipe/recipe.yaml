schema_version: 1

context:
  name: google-cloud-storage-transfer
  version: "1.20.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_cloud_storage_transfer-${{ version }}.tar.gz
  sha256: 8a6fe0c234e598d671f6959ab3766c1b1a8674614ad06a4f5351e882d30fb560

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    # more restrictive constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # more restrictive constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - google.cloud.storage_transfer
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: Google Cloud Storage Transfer API client library
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-storage-transfer

extra:
  recipe-maintainers:
    - xylar
